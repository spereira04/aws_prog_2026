name: CI/CD Pipeline

on:
  push:
    branches:
      - master
    
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write # Required for OIDC role assumption
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    
    # Map input or default to 'dev' when triggered by push
    env:
      DEPLOY_ENV: ${{ inputs.environment || 'dev' }}
      AWS_REGION: 'us-east-1' # Change to match your region

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and Push Simulator Image (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ steps.login-ecr.outputs.registry }}/f1-simulation-engine:latest \
            -f lambda/simulation-engine/Dockerfile \
            --push \
            lambda/simulation-engine

      - name: Build and Push Consumer Image (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ steps.login-ecr.outputs.registry }}/f1-telemetry-consumer:latest \
            -f lambda/simulation-engine/Dockerfile.consumer \
            --push \
            lambda/simulation-engine

      - name: Build and Push Prometheus Image (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ steps.login-ecr.outputs.registry }}/f1-prometheus:latest \
            -f monitoring/prometheus/Dockerfile \
            --push \
            monitoring/prometheus

      - name: Build and Push Grafana Image (X86_64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/f1-grafana:latest \
            -f monitoring/grafana/Dockerfile \
            --push \
            monitoring/grafana

      # --- Deploy SAM Serverless Application ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --config-env ${{ env.DEPLOY_ENV }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      # --- Force ECS Tasks to pull the newly built images ---
      - name: Force ECS Redeployment
        run: |
          CLUSTER_NAME="f1-simulation-cluster-${{ env.DEPLOY_ENV }}"
          echo "Listing and updating services for cluster $CLUSTER_NAME..."
          
          # Fetch all active service ARNs in the cluster
          SERVICES=$(aws ecs list-services --cluster "$CLUSTER_NAME" --query 'serviceArns[]' --output text --region ${{ env.AWS_REGION }})
          
          for service in $SERVICES; do
            echo "Forcing deployment for service: $service"
            aws ecs update-service \
              --cluster "$CLUSTER_NAME" \
              --service "$service" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done
