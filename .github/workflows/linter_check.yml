name: Python Code Quality (Lint)

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  lint:
    name: Run Python Linters
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # We use Ruff as it is extremely fast and combines linting and formatting rules
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Lint Check
        run: ruff check .

      - name: Run Ruff Format Check
        run: ruff format --check .
