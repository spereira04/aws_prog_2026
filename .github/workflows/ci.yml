name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
          npm install -g aws-cdk

      - name: 1. Quality Gate - Linting con Ruff
        run: ruff check . --ignore F541,F401,F841

      - name: 2. Quality Gate - Tests unitarios
        run: pytest tests/

      - name: 3. Quality Gate - Validación de CDK Synth
        run: cdk synth
